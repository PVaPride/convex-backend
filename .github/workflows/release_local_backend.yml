name: Release Self-Hosted Backend

on:
  workflow_call:
    outputs:
      backend_x64_digest:
        description: "x64 image digest"
        value: ${{ fromJson(jobs.read.outputs.result).digest.backend-x64 }}
      backend_arm64_digest:
        description: "arm64 image digest"
        value: ${{ fromJson(jobs.read.outputs.result).digest.backend-arm64 }}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build backend image
    strategy:
      matrix:
        arch: [x64, arm64]
    runs-on: [self-hosted, aws, "${{ matrix.arch }}", xlarge]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get UTC ISO8601 timestamp
        run:
          echo "COMMIT_TIMESTAMP=$(git log -1 --format='%aI' | date -f - --utc
          '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Build and push backend
        uses: useblacksmith/build-push-action@v2
        id: build-image
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: self-hosted/docker-build/Dockerfile.backend
          tags: |
            ghcr.io/get-convex/convex-backend
          outputs: push-by-digest=true,type=image,push=true
          provenance: false
          build-args: |
            VERGEN_GIT_SHA=${{ github.sha }}
            VERGEN_GIT_COMMIT_TIMESTAMP=${{ env.COMMIT_TIMESTAMP }}

      - name: Write digest
        uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # v1
        id: digest
        with:
          matrix-step-name: ${{ github.job }}
          matrix-key: backend-${{ matrix.arch }}
          outputs: |-
            digest: ${{ steps.build-image.outputs.digest }}

  read:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build]
    steps:
      - uses: cloudposse/github-action-matrix-outputs-read@33cac12fa9282a7230a418d859b93fdbc4f27b5a # v1
        id: read
        with:
          matrix-step-name: build
    outputs:
      result: "${{ steps.read.outputs.result }}"
